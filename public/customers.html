<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wing-O · Customer Database</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0D0D0D;font-family:'Barlow',sans-serif;min-height:100vh;color:white;padding:1rem;}
.wrap{max-width:1400px;margin:0 auto;}

/* HEADER */
.hd{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-top:4px solid #E8190A;border-radius:12px;padding:1.5rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.logo{font-family:'Anton',sans-serif;font-size:2rem;color:white;letter-spacing:2px;}
.logo span{color:#E8190A;}
.subtitle{font-family:'Oswald',sans-serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:2px;}
.hd-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
.btn{background:transparent;color:#888;border:1.5px solid #333;padding:.5rem 1rem;font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:5px;transition:all .15s;}
.btn:hover{color:white;border-color:#666;}
.btn.primary{background:#E8190A;color:white;border-color:#E8190A;}
.btn.primary:hover{background:#A8120A;border-color:#A8120A;}
.btn.gold{background:#F5A800;color:#0D0D0D;border-color:#F5A800;}
.btn.gold:hover{background:#C28200;border-color:#C28200;}

/* LOGIN */
.login-card{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-top:4px solid #E8190A;border-radius:12px;padding:2.5rem;max-width:420px;margin:4rem auto;}
.login-card h1{font-family:'Anton',sans-serif;font-size:2.2rem;color:white;letter-spacing:2px;margin-bottom:.3rem;text-align:center;}
.login-card h1 span{color:#E8190A;}
.login-card p{font-family:'Oswald',sans-serif;font-size:.78rem;color:#888;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:2rem;}
.login-card input{width:100%;background:#222;border:1.5px solid #333;border-radius:6px;padding:.85rem 1rem;font-family:'Barlow',sans-serif;font-size:1rem;color:white;outline:none;margin-bottom:1rem;}
.login-card input:focus{border-color:#E8190A;}
.login-card button{width:100%;background:#E8190A;color:white;border:none;padding:1rem;font-family:'Anton',sans-serif;font-size:1.2rem;letter-spacing:2px;cursor:pointer;border-radius:6px;text-transform:uppercase;}
.login-card button:hover{background:#A8120A;}
.login-err{color:#E8190A;font-family:'Oswald',sans-serif;font-size:.85rem;text-align:center;margin-top:.7rem;display:none;}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1rem;}
.stat{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:1rem 1.2rem;}
.stat-lbl{font-family:'Oswald',sans-serif;font-size:.68rem;color:#888;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.stat-val{font-family:'Anton',sans-serif;font-size:1.8rem;color:white;letter-spacing:1px;line-height:1;}
.stat-val.red{color:#E8190A;}
.stat-val.gold{color:#F5A800;}
.stat-val.green{color:#48BB78;}
.stat-sub{font-family:'Oswald',sans-serif;font-size:.7rem;color:#666;letter-spacing:1px;margin-top:4px;text-transform:uppercase;}

/* SEARCH BAR */
.search-bar{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:1rem;margin-bottom:1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.search-bar input,.search-bar select{background:#222;border:1.5px solid #333;border-radius:6px;padding:.6rem .9rem;font-family:'Barlow',sans-serif;font-size:.9rem;color:white;outline:none;}
.search-bar input{flex:1;min-width:200px;}
.search-bar input:focus,.search-bar select:focus{border-color:#E8190A;}
.search-bar select{cursor:pointer;}
.count{font-family:'Oswald',sans-serif;font-size:.78rem;color:#888;letter-spacing:1px;text-transform:uppercase;padding:.6rem 1rem;background:#222;border-radius:6px;}

/* TABLE — Desktop */
.table-wrap{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:#0D0D0D;}
th{font-family:'Oswald',sans-serif;font-size:.7rem;color:#888;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:.85rem 1rem;text-align:left;border-bottom:1px solid #333;cursor:pointer;user-select:none;}
th:hover{color:white;}
th.sorted-asc::after{content:' ↑';color:#F5A800;}
th.sorted-desc::after{content:' ↓';color:#F5A800;}
td{padding:.85rem 1rem;border-bottom:1px solid #222;font-size:.9rem;color:#CCC;}
tr{cursor:pointer;transition:background .12s;}
tr:hover td{background:#222;color:white;}
.badge{display:inline-block;background:rgba(245,168,0,.15);color:#F5A800;border:1px solid rgba(245,168,0,.4);padding:2px 8px;border-radius:50px;font-size:.65rem;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.badge.green{background:rgba(72,187,120,.15);color:#48BB78;border-color:rgba(72,187,120,.4);}
.badge.gray{background:rgba(255,255,255,.05);color:#888;border-color:rgba(255,255,255,.15);}
.name{color:white;font-weight:600;}
.money{color:#F5A800;font-family:'Oswald',sans-serif;font-weight:700;}

/* CARD VIEW (Mobile) */
.cards{display:none;flex-direction:column;gap:.6rem;}
.card{background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:1rem;cursor:pointer;}
.card:active{background:#222;}
.card-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem;}
.card-name{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:white;letter-spacing:.5px;text-transform:uppercase;}
.card-phone{font-size:.78rem;color:#888;margin-top:2px;}
.card-money{font-family:'Anton',sans-serif;font-size:1.3rem;color:#F5A800;letter-spacing:1px;}
.card-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem;}
.card-meta{font-family:'Oswald',sans-serif;font-size:.7rem;color:#666;letter-spacing:1px;text-transform:uppercase;}

@media(max-width:768px){
  .table-wrap{display:none;}
  .cards{display:flex;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .hd{padding:1rem;}
  .logo{font-size:1.5rem;}
}

/* DETAIL MODAL */
.modal-ov{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);padding:1rem;overflow-y:auto;}
.modal-ov.open{display:block;}
.modal{background:#1A1A1A;border:1px solid #333;border-radius:12px;max-width:580px;margin:2rem auto;overflow:hidden;}
.modal-hd{background:linear-gradient(135deg,#0D0D0D,#1A1208);padding:1.5rem;border-bottom:3px solid #E8190A;display:flex;justify-content:space-between;align-items:start;}
.modal-name{font-family:'Anton',sans-serif;font-size:1.8rem;color:white;letter-spacing:1.5px;line-height:1;}
.modal-phone{font-family:'Oswald',sans-serif;font-size:.85rem;color:#F5A800;letter-spacing:1px;margin-top:4px;}
.modal-email{font-size:.85rem;color:#888;margin-top:2px;}
.x{background:none;border:none;color:#888;font-size:1.4rem;cursor:pointer;}
.modal-bd{padding:1.5rem;}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.2rem;}
.kv-cell{background:#222;border-radius:8px;padding:.85rem;}
.kv-lbl{font-family:'Oswald',sans-serif;font-size:.6rem;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.kv-val{font-family:'Anton',sans-serif;font-size:1.4rem;color:white;letter-spacing:1px;}
.kv-val.gold{color:#F5A800;}
.kv-val.green{color:#48BB78;}
.section-title{font-family:'Oswald',sans-serif;font-size:.75rem;color:#888;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin:1rem 0 .6rem;}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:.6rem .85rem;background:#222;border-radius:6px;margin-bottom:.4rem;font-size:.85rem;}
.order-num{font-family:'Oswald',sans-serif;color:#F5A800;font-weight:600;letter-spacing:1px;}
.order-meta{font-size:.72rem;color:#666;margin-top:2px;}
.order-total{font-family:'Anton',sans-serif;color:white;font-size:1.1rem;letter-spacing:1px;}

.empty{padding:4rem 1rem;text-align:center;color:#666;font-family:'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase;font-size:.85rem;}
</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view">
  <div class="login-card">
    <h1>WING<span>-O</span></h1>
    <p>Customer Database · Admin Access</p>
    <input type="password" id="pw" placeholder="Enter admin password" autocomplete="off">
    <button onclick="login()">UNLOCK 🔓</button>
    <div class="login-err" id="login-err">Wrong password</div>
  </div>
</div>

<!-- MAIN VIEW -->
<div id="main-view" style="display:none;">
  <div class="wrap">

    <!-- Header -->
    <div class="hd">
      <div>
        <div class="logo">WING<span>-O</span> CUSTOMERS</div>
        <div class="subtitle" id="updated-at">Loading database...</div>
      </div>
      <div class="hd-actions">
        <button class="btn" onclick="loadCustomers()">↻ Refresh</button>
        <button class="btn gold" onclick="exportCSV()">📥 Export CSV</button>
        <button class="btn" onclick="logout()">Lock</button>
      </div>
    </div>

    <!-- Stats grid -->
    <div class="stats" id="stats"></div>

    <!-- Search bar -->
    <div class="search-bar">
      <input type="search" id="q" placeholder="🔍 Search by name, phone, or email..." oninput="render()">
      <select id="filter-loc" onchange="render()">
        <option value="">All locations</option>
        <option value="albert-st">Albert Street</option>
        <option value="rochdale">Rochdale</option>
        <option value="east-regina">East Regina</option>
        <option value="moose-jaw">Moose Jaw</option>
        <option value="regina-beach">Regina Beach</option>
      </select>
      <select id="filter-tier" onchange="render()">
        <option value="">All customers</option>
        <option value="loyalty">Loyalty members</option>
        <option value="repeat">Repeat (2+ orders)</option>
        <option value="vip">VIP (5+ orders)</option>
        <option value="new">New (1 order)</option>
      </select>
      <div class="count" id="count">0 customers</div>
    </div>

    <!-- Desktop table -->
    <div class="table-wrap">
      <table id="tbl">
        <thead>
          <tr>
            <th data-sort="firstName">Name</th>
            <th data-sort="phone">Phone</th>
            <th data-sort="totalOrders">Orders</th>
            <th data-sort="totalRevenue">Spent</th>
            <th data-sort="avgOrderValue">Avg</th>
            <th data-sort="favoriteLocation">Favorite</th>
            <th data-sort="lastOrderDate">Last Order</th>
            <th>Tier</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="cards" id="cards"></div>

  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-hd" id="modal-hd"></div>
    <div class="modal-bd" id="modal-bd"></div>
  </div>
</div>

<script>
var API = window.location.origin;
var STATE = { password: '', customers: [], filtered: [], stats: {}, sortKey: 'lastOrderDate', sortDir: 'desc' };
var LOC_NAMES = {
  'albert-st':'Albert Street','rochdale':'Rochdale','east-regina':'East Regina',
  'moose-jaw':'Moose Jaw','regina-beach':'Regina Beach'
};

// === LOGIN ===
document.getElementById('pw').addEventListener('keydown', function(e){
  if(e.key === 'Enter') login();
});

async function login(){
  var pw = document.getElementById('pw').value.trim();
  if(!pw){ showErr('Enter password'); return; }
  try {
    var r = await fetch(API + '/api/customers?password=' + encodeURIComponent(pw));
    if(r.status === 401){ showErr('Wrong password'); return; }
    var d = await r.json();
    if(!d.success){ showErr(d.error || 'Failed to load'); return; }
    STATE.password = pw;
    STATE.customers = d.customers || [];
    STATE.stats = d.stats || {};
    sessionStorage.setItem('wingo_customers_pw', pw);
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('main-view').style.display = 'block';
    renderStats();
    render();
    document.getElementById('updated-at').textContent = 'Updated ' + new Date().toLocaleTimeString('en-CA');
  } catch(e){ showErr('Connection error'); }
}

function showErr(msg){
  var el = document.getElementById('login-err');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 3000);
}

function logout(){
  sessionStorage.removeItem('wingo_customers_pw');
  STATE.password = '';
  STATE.customers = [];
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('pw').value = '';
}

async function loadCustomers(){
  if(!STATE.password) return;
  try {
    var r = await fetch(API + '/api/customers?password=' + encodeURIComponent(STATE.password));
    var d = await r.json();
    if(d.success){
      STATE.customers = d.customers || [];
      STATE.stats = d.stats || {};
      renderStats();
      render();
      document.getElementById('updated-at').textContent = 'Updated ' + new Date().toLocaleTimeString('en-CA');
    }
  } catch(e){ console.warn('Reload failed:', e); }
}

// === RENDER ===
function renderStats(){
  var s = STATE.stats;
  var html =
    '<div class="stat"><div class="stat-lbl">Total Customers</div><div class="stat-val">'+fmt(s.totalCustomers||0)+'</div><div class="stat-sub">'+fmt(s.repeatCustomers||0)+' repeat</div></div>'+
    '<div class="stat"><div class="stat-lbl">New This Week</div><div class="stat-val green">+'+fmt(s.newThisWeek||0)+'</div><div class="stat-sub">'+fmt(s.newToday||0)+' today</div></div>'+
    '<div class="stat"><div class="stat-lbl">New This Month</div><div class="stat-val gold">+'+fmt(s.newThisMonth||0)+'</div><div class="stat-sub">last 30 days</div></div>'+
    '<div class="stat"><div class="stat-lbl">Total Orders</div><div class="stat-val">'+fmt(s.totalOrders||0)+'</div><div class="stat-sub">all customers</div></div>'+
    '<div class="stat"><div class="stat-lbl">Total Revenue</div><div class="stat-val red">$'+fmtMoney(s.totalRevenue||0)+'</div><div class="stat-sub">lifetime</div></div>'+
    '<div class="stat"><div class="stat-lbl">Avg Lifetime Value</div><div class="stat-val gold">$'+fmtMoney(s.avgLifetimeValue||0)+'</div><div class="stat-sub">per customer</div></div>'+
    '<div class="stat"><div class="stat-lbl">Loyalty Members</div><div class="stat-val">'+fmt(s.loyaltyMembers||0)+'</div><div class="stat-sub">Saucy Stamps</div></div>';
  document.getElementById('stats').innerHTML = html;
}

function render(){
  var q = (document.getElementById('q').value || '').toLowerCase().trim();
  var locFilter = document.getElementById('filter-loc').value;
  var tierFilter = document.getElementById('filter-tier').value;

  var filtered = STATE.customers.filter(function(c){
    if(q){
      var hay = (c.firstName + ' ' + c.lastName + ' ' + c.phone + ' ' + c.email).toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    if(locFilter && c.favoriteLocation !== locFilter) return false;
    if(tierFilter === 'loyalty' && !c.isLoyaltyMember) return false;
    if(tierFilter === 'repeat' && c.totalOrders < 2) return false;
    if(tierFilter === 'vip' && c.totalOrders < 5) return false;
    if(tierFilter === 'new' && c.totalOrders !== 1) return false;
    return true;
  });

  // Sort
  filtered.sort(function(a, b){
    var av = a[STATE.sortKey];
    var bv = b[STATE.sortKey];
    if(STATE.sortKey === 'firstName' || STATE.sortKey === 'phone' || STATE.sortKey === 'favoriteLocation'){
      av = (av || '').toString().toLowerCase();
      bv = (bv || '').toString().toLowerCase();
      return STATE.sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    if(STATE.sortKey === 'lastOrderDate' || STATE.sortKey === 'firstOrderDate'){
      av = new Date(av).getTime();
      bv = new Date(bv).getTime();
    }
    av = Number(av) || 0;
    bv = Number(bv) || 0;
    return STATE.sortDir === 'asc' ? av - bv : bv - av;
  });

  STATE.filtered = filtered;

  document.getElementById('count').textContent = filtered.length + ' customer' + (filtered.length !== 1 ? 's' : '');

  // Update sort indicators
  document.querySelectorAll('th').forEach(function(th){
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.dataset.sort === STATE.sortKey){
      th.classList.add('sorted-' + STATE.sortDir);
    }
  });

  // Render table
  var tbody = document.getElementById('tbody');
  if(!filtered.length){
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No customers match your filters</td></tr>';
    document.getElementById('cards').innerHTML = '<div class="empty">No customers match your filters</div>';
    return;
  }
  tbody.innerHTML = filtered.map(function(c, i){
    return '<tr onclick="openDetail('+i+')">'+
      '<td><div class="name">'+escapeHtml(c.firstName)+' '+escapeHtml(c.lastName)+'</div></td>'+
      '<td>'+formatPhone(c.phone)+'</td>'+
      '<td>'+c.totalOrders+'</td>'+
      '<td class="money">$'+fmtMoney(c.totalRevenue)+'</td>'+
      '<td>$'+fmtMoney(c.avgOrderValue)+'</td>'+
      '<td>'+(LOC_NAMES[c.favoriteLocation] || '—')+'</td>'+
      '<td>'+timeAgo(c.lastOrderDate)+'</td>'+
      '<td>'+tierBadge(c)+'</td>'+
    '</tr>';
  }).join('');

  // Render cards (mobile)
  var cards = document.getElementById('cards');
  cards.innerHTML = filtered.map(function(c, i){
    return '<div class="card" onclick="openDetail('+i+')">'+
      '<div class="card-top">'+
        '<div><div class="card-name">'+escapeHtml(c.firstName)+' '+escapeHtml(c.lastName)+'</div><div class="card-phone">'+formatPhone(c.phone)+'</div></div>'+
        '<div class="card-money">$'+fmtMoney(c.totalRevenue)+'</div>'+
      '</div>'+
      '<div class="card-bot">'+
        '<span class="card-meta">'+c.totalOrders+' order'+(c.totalOrders!==1?'s':'')+' · '+timeAgo(c.lastOrderDate)+'</span>'+
        tierBadge(c)+
      '</div>'+
    '</div>';
  }).join('');
}

// === SORT ===
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('th[data-sort]').forEach(function(th){
    th.addEventListener('click', function(){
      var key = th.dataset.sort;
      if(STATE.sortKey === key){
        STATE.sortDir = STATE.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        STATE.sortKey = key;
        STATE.sortDir = key === 'firstName' ? 'asc' : 'desc';
      }
      render();
    });
  });
  // Auto-login if session has password
  var saved = sessionStorage.getItem('wingo_customers_pw');
  if(saved){
    document.getElementById('pw').value = saved;
    login();
  }
});

// === DETAIL ===
function openDetail(i){
  var c = STATE.filtered[i];
  if(!c) return;
  document.getElementById('modal-hd').innerHTML =
    '<div>'+
      '<div class="modal-name">'+escapeHtml(c.firstName)+' '+escapeHtml(c.lastName)+'</div>'+
      '<div class="modal-phone">'+formatPhone(c.phone)+'</div>'+
      (c.email ? '<div class="modal-email">'+escapeHtml(c.email)+'</div>' : '')+
    '</div>'+
    '<button class="x" onclick="closeModal()">✕</button>';

  var bd = '<div class="kv">'+
    '<div class="kv-cell"><div class="kv-lbl">Total Orders</div><div class="kv-val">'+c.totalOrders+'</div></div>'+
    '<div class="kv-cell"><div class="kv-lbl">Lifetime Spent</div><div class="kv-val gold">$'+fmtMoney(c.totalRevenue)+'</div></div>'+
    '<div class="kv-cell"><div class="kv-lbl">Avg Order</div><div class="kv-val">$'+fmtMoney(c.avgOrderValue)+'</div></div>'+
    '<div class="kv-cell"><div class="kv-lbl">First Order</div><div class="kv-val" style="font-size:.95rem;">'+formatDate(c.firstOrderDate)+'</div></div>'+
  '</div>';

  bd += '<div class="section-title">📍 Favorite Location</div>'+
    '<div class="order-row"><span>'+(LOC_NAMES[c.favoriteLocation] || 'Unknown')+'</span><span class="order-total">'+(c.locations[c.favoriteLocation]||0)+' orders</span></div>';

  if(c.isLoyaltyMember){
    bd += '<div class="section-title">🍗 Saucy Stamps</div>'+
      '<div class="order-row"><span>Stamps: '+c.loyaltyStamps+' / 10</span><span class="order-total">'+(c.loyaltyFreeEarned||0)+' free earned</span></div>';
    if(c.referralCode){
      bd += '<div class="order-row"><span>Referral code: <strong>'+c.referralCode+'</strong></span><span class="order-total">'+(c.referralCount||0)+' refs</span></div>';
    }
  }

  bd += '<div class="section-title">📜 Order History ('+c.orders.length+')</div>';
  bd += c.orders.slice(0, 20).map(function(o){
    return '<div class="order-row">'+
      '<div><div class="order-num">'+o.orderNum+'</div><div class="order-meta">'+formatDate(o.date)+' · '+(LOC_NAMES[o.location]||o.location)+' · '+(o.orderType||'pickup')+'</div></div>'+
      '<div class="order-total">$'+fmtMoney(o.total||0)+'</div>'+
    '</div>';
  }).join('');

  document.getElementById('modal-bd').innerHTML = bd;
  document.getElementById('modal-ov').classList.add('open');
}

function closeModal(){ document.getElementById('modal-ov').classList.remove('open'); }

// === EXPORT ===
function exportCSV(){
  var headers = ['First Name','Last Name','Phone','Email','Total Orders','Lifetime Spent','Avg Order','Favorite Location','First Order','Last Order','Loyalty Member','Stamps','Referrals'];
  var rows = STATE.filtered.map(function(c){
    return [
      c.firstName, c.lastName, c.phone, c.email,
      c.totalOrders, c.totalRevenue.toFixed(2), c.avgOrderValue.toFixed(2),
      LOC_NAMES[c.favoriteLocation] || c.favoriteLocation,
      formatDate(c.firstOrderDate), formatDate(c.lastOrderDate),
      c.isLoyaltyMember ? 'YES' : 'NO',
      c.loyaltyStamps || 0,
      c.referralCount || 0
    ].map(escapeCSV).join(',');
  });
  var csv = headers.join(',') + '\n' + rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'wingo-customers-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeCSV(v){
  v = String(v == null ? '' : v);
  if(v.indexOf(',') !== -1 || v.indexOf('"') !== -1 || v.indexOf('\n') !== -1){
    return '"' + v.replace(/"/g, '""') + '"';
  }
  return v;
}

// === HELPERS ===
function fmt(n){ return Number(n).toLocaleString('en-CA'); }
function fmtMoney(n){ return Number(n||0).toFixed(2); }
function formatPhone(p){
  p = (p||'').replace(/\D/g,'');
  if(p.length === 10) return '('+p.slice(0,3)+') '+p.slice(3,6)+'-'+p.slice(6);
  if(p.length === 11) return p.charAt(0)+' ('+p.slice(1,4)+') '+p.slice(4,7)+'-'+p.slice(7);
  return p;
}
function timeAgo(d){
  if(!d) return '—';
  var diff = Date.now() - new Date(d).getTime();
  var mins = Math.floor(diff/60000);
  if(mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins/60);
  if(hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs/24);
  if(days < 30) return days + 'd ago';
  var months = Math.floor(days/30);
  return months + 'mo ago';
}
function formatDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' });
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function tierBadge(c){
  if(c.totalOrders >= 5) return '<span class="badge gold" style="background:rgba(232,25,10,.15);color:#E8190A;border-color:rgba(232,25,10,.4);">VIP</span>';
  if(c.totalOrders >= 2) return '<span class="badge green">Repeat</span>';
  if(c.isLoyaltyMember) return '<span class="badge">Loyalty</span>';
  return '<span class="badge gray">New</span>';
}
